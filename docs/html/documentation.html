<html>

<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Avenir Next">
    <style>
        body {
          font-family: "Avenir Next", sans-serif;
        }
        p {
            margin-top: 0;
        }
        p.indent {
            margin-left: 50%;
        }
        p.small {
            font-size: 80%;
        }
        p.large {
            font-size: 125%;
        }
        h1 {
            line-height: 1.0;
            /* color: #4F2683; */              
            color: #cc0000;            }
        h2 {
            padding-top: 40px;
            line-height: 1.0;
            color: #000;
        }
        h3 {
            line-height: 1.0;
        }
        .purple {
            /* color: #4F2683; */              
            color: #cc0000;             
        }
        .bg_grey {
            background-color: #eee;
            padding:5 15 5 15;
        }
        .border-above {
            clear: left;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid;
            border-color: #aaa;
        }
        th, td {
            border-bottom: 1px solid;
        }
        img.float  {
            float: left;
            padding: 0 20 20 0;
            width: 100%;
            max-width: 45%;
        }
        div {
            clear: both;
        }

        .annotated{
  position:relative;
}

.annotated img{ 
  display:block;
}

.annotated b{ 
    /* Hide the figcaption’s title. */
  position:absolute;
  left:-99999px;
}

.annotated ul{ 
    /* Set up the canvas for the annotations to sit on. */
  list-style:none;
  position:absolute; 
  top:0;
  right:0;
  bottom:0;
  left:0;
}

.annotated li{
  position:absolute;
}

.box {
    color:white;
    white-space:nowrap; 
    background:#cc0000;
  width: auto;
  height: 1li;
  padding: 5;
  color: #fff;
}

.box.arrow-top:after {
  content: "";
  position:absolute;
  bottom: 100%;
  left: 0%;
  border-top: none;
  border-right: 10px solid transparent;
  border-left: 10px solid transparent;
  border-bottom: 15px solid #cc0000;
}

.box.arrow-right:after {
  content: "";
  position:absolute;
  right: -15px;
  top: 0%;
  border-top:10px solid transparent;
  border-right: none;
  border-left: 15px solid #cc0000;
  border-bottom: 10px solid transparent;
}

.box.arrow-top-right:after {
  content: "";
  position:absolute;
  left: 80;
  bottom: 100%;
  border-top: none;
  border-right: 10px solid transparent;
  border-left: 10px solid transparent;
  border-bottom: 15px solid #cc0000;
}

.box.arrow-bottom:after {
  content: "";
  position:absolute;
  right: 30px;
  bottom: -15px;
  border-top: 15px solid #cc0000;
  border-right: 15px solid transparent;
  border-left: 15px solid transparent;
  border-bottom: none;
}

.box.arrow-left:after {
  content: "";
  position:absolute;
  left: -15px;
  top: 0px;
  border-top: 10px solid transparent;
  border-right: 15px solid #cc0000;
  border-left: none;
  border-bottom: 10px solid transparent;
}
        </style>
        </head>

<body>
<div style = "padding:10px 20% 10px 20%;">

<div>
    <h1>How to use the observatory</h1>
    <p class = "large">The <strong class = "purple">Canadian Census Observatory</strong> enables you to visualize change in the characteristics of neighbourhoods over time in several ways.</p>
</div>

</body>
</html>
